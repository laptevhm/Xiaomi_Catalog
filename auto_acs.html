<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аксесуари для авто</title>
  <link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #1d1d1f; }
        .back { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #0066cc; font-size: 17px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.02em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #f5f5f7; padding: 20px; border-radius: 22px; text-align: center; transition: transform 0.2s ease; }
        .item:hover { transform: scale(1.02); }
        .img-box { background: #fff; height: 180px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .n { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 8px; line-height: 1.3; }
        .c { font-size: 11px; color: #86868b; margin-bottom: 12px; display: block; }
        .p { font-size: 19px; font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Назад</a>
    <h1>Аксесуари для авто</h1>
    <div class="product-grid" id="list"></div>

    <script>
        const rate = 44.50;
        const margin = 1.10;

        // Список товарів (виправлено помилки та пробіли в ID)
        const products = [
            { id: "0008100	Відеорегистратор Gazer F155", usd:	74.00 },
 { id: "0008518", name: "Кабель OBD hardwire kit for N1/N3/N5/Z40/Z50/E3", usd:	16.28 },
 { id: "6934177712739", name: "Автотримач+ЗП Безпровідний Xiaomi Mi Qi Wireless QC3.0 20W ( 565453)", usd:	38.44 },
 { id: "6934177716201", name: "АЗП Xiaomi Mi Car Charger (CC06ZM) QC 3.0 37W", usd:	9.36 },
 { id: "6934177722271", name: "АЗП Xiaomi Car Charger 100W Type-C+USB (CC07ZM/BHR4460CN)", usd:	18.50 },
 { id: "6934177735066", name: "Автотримач+ЗП бездротовий  Xiaomi Wireless Car Charger Pro 50w Max (WCJ05ZM)", usd:	57.00 },
 { id: "6934177745508", name: "Портативний насос Mijia Electric Pump 1S (MJCQB04QJ/BHR5127CN)", usd:	32.00 },
 { id: "6934915203741", name: "DDPai Mini Pro (без дисплею)", usd:	32.50 },
 { id: "6934915204120", name: "Відеореєстратор Ddpai N5 dual  1103893", usd:	113.58},
 { id: "6934915204465", name: "Кабель OBD hardwire kit for Z60/MINI2X/Z60 Pro", usd:	16.28},
 { id: "6934915204663", name: "Відеореєстратор Ddpai Z50 Pro Dual  1156662", usd:	107.50},
 { id: "6971669780203", name: "Xiaomi 70mai Car Air Compressor Lite (12V 11 Bar) (Midrive TP03)", usd:	29.00},
 { id: "6971669780401", name: "Автокомпресор Xiaomi 70Mai (Midrive TP01) 0.1-7 bar\12V\10A", usd:	45.50},
 { id: "6971669780425", name: "Стартер для авто Xiaomi 70mai Car Jump Starter Battery Type-C 11100mAh (Middrive PS01)", usd:	60.11},
 { id: "6971669780517", name: "Xiaomi 70 Mai T02 Tire Pressure Monitoring Sytem Lite", usd:	51.00},
 { id: "6971669780708", name: "70mai HD Backup Camera (MidriveRC04)", usd:	18.50},
 { id: "6971669781392", name: "Кабель режиму паркування Xiaomi 70Mai Hardware Kit (Midrive UP03)", usd:	14.50},
 { id: "6971669782672", name: "Відеореєстратор 70mai Rearview Dash Cam S500", usd:126.00},
 { id: "6971669782719", name: "Відеореєстратор 70mai Dash Cam 3 M200 (1055361)", usd:	60.00},
 { id: "6971669782740", name: "Відеореєстратор 70mai Dash Cam A510 + RC11 Rear Camera", usd:	111.98},
 { id: "6971669782764", name: "Відеореєстратор 70mai Dash Cam A200 (1040052)", usd:	61.30},
 { id: "6971669782771", name: "Відеореєстратор 70mai Dash Cam A200 + RC11 Rear Camera Set  1138892", usd:	73.50 },
 { id: "6971669784539", name: "Відеореєстратор 70mai Dash Cam 4K LTE M800-2 128GB Set (1176391)", usd:	197.65 },
 { id: "6971669784713", name: "Відеореєстратор 70mai Dash Cam 4K LTE A800SE-2 Set (1182550)", usd:	138.49 },
 { id: "6971669784812", name: "Кабель реж.паркув.70mai Adjustable Hardwire Kit Midrive UP06 (1176392)", usd:	25.67 },
                  
        ];

        const list = document.getElementById('list');

        products.forEach(item => {
            const uah = Math.ceil((item.usd * rate * margin) / 5) * 5;
            
            const card = document.createElement('div');
            card.className = 'item';
            
            // Створюємо чистий шаблон картки
            card.innerHTML = `
                <div class="img-box">
                    <img src="images/${item.id}.webp" id="img-${item.id}" alt="${item.name}">
                </div>
                <div class="n">${item.name}</div>
                <span class="c">Арт: ${item.id}</span>
                <div class="p">${uah.toLocaleString()} грн</div>
            `;
            
            list.appendChild(card);

            // Окрема логіка перевірки картинок для кожного ID
            const imgElement = document.getElementById(`img-${item.id}`);
            
            imgElement.onerror = function() {
                // Якщо не знайшли .webp, пробуємо .jpg
                if (this.src.endsWith('.webp')) {
                    this.src = `images/${item.id}.jpg`;
                } 
                // Якщо і .jpg не знайшли, ставимо іконку
                else if (this.src.endsWith('.jpg')) {
                    this.src = 'https://img.icons8.com/ios/100/86868b/electronics.png';
                    this.onerror = null; // Зупиняємо цикл помилок
                }
            };
        });
    </script>
</body>
</html>
