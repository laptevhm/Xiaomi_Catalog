<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рюкзаки, сумки та елементи одягу</title>
  <link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #1d1d1f; }
        .back { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #0066cc; font-size: 17px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.02em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #f5f5f7; padding: 20px; border-radius: 22px; text-align: center; transition: transform 0.2s ease; }
        .item:hover { transform: scale(1.02); }
        .img-box { background: #fff; height: 180px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .n { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 8px; line-height: 1.3; }
        .c { font-size: 11px; color: #86868b; margin-bottom: 12px; display: block; }
        .p { font-size: 19px; font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Назад</a>
    <h1>Рюкзаки, сумки та елементи одягу</h1>
    <div class="product-grid" id="list"></div>

    <script>
        const rate = 44.50;
        const margin = 1.10;

        // Список товарів (виправлено помилки та пробіли в ID)
        const products = [
 { id: "6934177711664", name:	"Рюкзак Mi business multi-functional shoulder bag 2 Black", usd:	54.28},
 { id: "6934177715846", name:	"Рюкзак Mi City Backpack 2 (Dark Gray)", usd:	33.40},
 { id: "6934177748110", name:	"Сумка на пояс Xiaomi Sports Fanny Pack Black (AN) (941946)", usd:	15.36},
 { id: "6972281349779", name:	"Xiaomi Qimian DuPont/Silvadur antibacterial men's socks Grey Black 3 pcs pack", usd:	10.00},
 { id: "810648012002", name:	"Рукавички Moshi Digits touch screen L (99MO065031)", usd:	27.00}
                  
        ];

        const list = document.getElementById('list');

        products.forEach(item => {
            const uah = Math.ceil((item.usd * rate * margin) / 5) * 5;
            
            const card = document.createElement('div');
            card.className = 'item';
            
            // Створюємо чистий шаблон картки
            card.innerHTML = `
                <div class="img-box">
                    <img src="images/${item.id}.webp" id="img-${item.id}" alt="${item.name}">
                </div>
                <div class="n">${item.name}</div>
                <span class="c">Арт: ${item.id}</span>
                <div class="p">${uah.toLocaleString()} грн</div>
            `;
            
            list.appendChild(card);

            // Окрема логіка перевірки картинок для кожного ID
            const imgElement = document.getElementById(`img-${item.id}`);
            
            imgElement.onerror = function() {
                // Якщо не знайшли .webp, пробуємо .jpg
                if (this.src.endsWith('.webp')) {
                    this.src = `images/${item.id}.jpg`;
                } 
                // Якщо і .jpg не знайшли, ставимо іконку
                else if (this.src.endsWith('.jpg')) {
                    this.src = 'https://img.icons8.com/ios/100/86868b/electronics.png';
                    this.onerror = null; // Зупиняємо цикл помилок
                }
            };
        });
    </script>
</body>
</html>
