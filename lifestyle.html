<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товари для способу життя</title>
  <link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #1d1d1f; }
        .back { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #0066cc; font-size: 17px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.02em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #f5f5f7; padding: 20px; border-radius: 22px; text-align: center; transition: transform 0.2s ease; }
        .item:hover { transform: scale(1.02); }
        .img-box { background: #fff; height: 180px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .n { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 8px; line-height: 1.3; }
        .c { font-size: 11px; color: #86868b; margin-bottom: 12px; display: block; }
        .p { font-size: 19px; font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Назад</a>
    <h1>Товари для способу життя</h1>
    <div class="product-grid" id="list"></div>

    <script>
        const rate = 44.50;
        const margin = 1.10;

        // Список товарів (виправлено помилки та пробіли в ID)
        const products = [
 { id: "0008923", name: "	Розумна скакалка Xiaomi Smart Jump Rope (BHR6944GL)", usd:	22.56},
 { id: "001012013347", name: "	Xiaomi ZuoDu Automatic Umbrella+light (106 cm+підсвітка)", usd:	19.21},
 { id: "3113601", name: "	Рогатка Xiaomi HX Outdoors Hunting Slingshot (EDC-079A)", usd:	17.80},
 { id: "57076731247", name: "	Парасолька  ZUODU (з ліхтариком та світловібивачем) Black", usd: 17.50},
 { id: "57076731248", name: "	Парасолька  ZUODU (з ліхтариком та світловібивачем) Red", usd:	18.60},
 { id: "6926586347589", name: "	Еспандер Xiaomi Yunmai Wrist Ball (YMGB-Z701)", usd:	10.30},
 { id: "6932554480790", name: "	Трекер Xiaomi Tag 1 Pack BHR08SPGL", usd:	12.56},
 { id: "6934177707278", name: "	Xiaomi Turok Steinhardt Anti-blue Glasses Clear (HMJ02TS/DMU4046TY)", usd:	19.00},
 { id: "6941812744222", name: "	Принтер стікерів Xiaomi Mijia Label Printer Set White  (BHR7606CN)", usd:	23.70},
 { id: "6941812763476", name: "	Окуляри Xiaomi Sport Sunglasses BHR8027GL  1115162", usd:	25.49},
 { id: "6941812763506", name: "	Окуляри Xiaomi Polarized Fitover Sunglasses BHR8024GL  1115161", usd:	12.74},
 { id: "6941812792056", name: "	Окуляри Xiaomi Blue Light Blocking Glasses (Чорний)", usd:	14.47},
 { id: "6944527436895", name: "	Масажний пістолет SKG Gun F3mini Gray\Green", usd:	67.17},
 { id: "6944527438011", name: "	Масажний пістолет SKG Gun F3mini Red", usd:	67.17},
 { id: "6944527440816", name: "	Массажер для тіла SKG F3 LITE", usd:	40.02},
 { id: "6944527441691", name: "	Масажер для колін з прогрівомта вібрацією SKG W3 Pro", usd:	64.10},
 { id: "6944527441837", name: "	Масажер для тіла SKG W7Pro Waist Massager", usd:	64.11},
 { id: "6944527442070", name: "	Масажна подушка Шиацу для спини та тіла SKG T1-2 PRO", usd:	42.73},
 { id: "6970740900158", name: "	Окляри компютерні Xiaomi Turok Steinhardt Anti-blue Glasses FU006 (DMU4007RT) Black", usd:	15.05},
 { id: "6970740900189", name: "	Окуляри TS Turok Steinhardt Sunglasses рогова оправа (885737)", usd:	35.00},
 { id: "6974660080013", name: "	Пляшка для води Xiaomi Duiera Sports Gradient Tritan Water Cup 700ml", usd:	10.60},
 { id: "6975061532217", name: "	Вентилятор Jisulife FA43 beige", usd:	11.46}
                  
        ];

        const list = document.getElementById('list');

        products.forEach(item => {
            const uah = Math.ceil((item.usd * rate * margin) / 5) * 5;
            
            const card = document.createElement('div');
            card.className = 'item';
            
            // Створюємо чистий шаблон картки
            card.innerHTML = `
                <div class="img-box">
                    <img src="images/${item.id}.webp" id="img-${item.id}" alt="${item.name}">
                </div>
                <div class="n">${item.name}</div>
                <span class="c">Арт: ${item.id}</span>
                <div class="p">${uah.toLocaleString()} грн</div>
            `;
            
            list.appendChild(card);

            // Окрема логіка перевірки картинок для кожного ID
            const imgElement = document.getElementById(`img-${item.id}`);
            
            imgElement.onerror = function() {
                // Якщо не знайшли .webp, пробуємо .jpg
                if (this.src.endsWith('.webp')) {
                    this.src = `images/${item.id}.jpg`;
                } 
                // Якщо і .jpg не знайшли, ставимо іконку
                else if (this.src.endsWith('.jpg')) {
                    this.src = 'https://img.icons8.com/ios/100/86868b/electronics.png';
                    this.onerror = null; // Зупиняємо цикл помилок
                }
            };
        });
    </script>
</body>
</html>
