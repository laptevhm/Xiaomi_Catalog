<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт-годинники</title>
  <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #1d1d1f; }
        .back { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #0066cc; font-size: 17px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.02em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #f5f5f7; padding: 20px; border-radius: 22px; text-align: center; transition: transform 0.2s ease; }
        .item:hover { transform: scale(1.02); }
        .img-box { background: #fff; height: 180px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .n { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 8px; line-height: 1.3; }
        .c { font-size: 11px; color: #86868b; margin-bottom: 12px; display: block; }
        .p { font-size: 19px; font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Назад</a>
    <h1>Смарт-годинники</h1>
    <div class="product-grid" id="list"></div>

    <script>
        const rate = 44.50;
        const margin = 1.10;

        // Список товарів (виправлено помилки та пробіли в ID)
        const products = [
          { id: "06941812775745", name: "Xiaomi Mi Band 9 Glacier Silver EU", usd:32 },
          { id: "6932554419813", name: "Фітнес-браслет Xiaomi Mi Band 10 Glacier Silver (1146725)", usd:43 },
          { id: "6932554419844", name: "Фітнес-браслет Xiaomi Mi Band 10 Mystic Rose (1146726)", usd:43 },
          { id: "6932554434205", name: "Фітнес-браслет Xiaomi Mi Band 10 Ceramic Pearl White (1146727)", usd: 60},
          { id: "6934177757402", name: "Фітнес-браслет Xiaomi Redmi Smart Band Pro Black", usd:23 },
          { id: "6934177785672", name: "Фітнес-браслет Xiaomi Mi Band 7 Pro Ivory (952450)", usd:73.78 },
          { id: "6941812706312", name: "Фітнес-браслет Xiaomi Smart Band 9 Active (BHR9441GL) White", usd:20.47 },
          { id: "6941812707432", name: "Смарт-годинник Xiaomi Watch S4 Silver 1126557", usd:143 },
          { id: "6941812722916", name: "Фітнес-браслет Xiaomi Mi Band 8 Graphite UA (996386)", usd:33 },
          { id: "6941812722930", name: "Фітнес-браслет Xiaomi Mi Band 8 Black EU 1 міс гарантії", usd:30 },
          { id: "6941812775714", name: "Фітнес-браслет Xiaomi Mi Band 9 Midnight Black UA (1071800)", usd:36.75 },
          { id: "6970100377866", name: "Смарт-годинник Amazfit Bip 6 Black (Чорний) W2435AP1N 1147278", usd:71.50 },
          { id: "6970100377880", name: "Смарт-годинник Amazfit Bip 6 (RED) W2435AP1N 1147280", usd:71 },
          { id: "6972596106821", name: "Смарт-годинник Xiaomi Amazfit Bip 5 Cream White (997955)", usd:67 },
          { id: "6972596106838", name: "Смарт-годинник Xiaomi Amazfit Bip 5 PastelPink (рожевий)", usd:55 },
          { id: "6977541630024", name: "Смарт-годинник Black Shark GS3 Green (1091680)", usd:61.11 },
          { id: "6977541630604", name: "Смарт-Годинник Black Shark GS3 Sport BS-W2402 LB (Лавово-Чорний)", usd:57 }
        ];

        const list = document.getElementById('list');

        products.forEach(item => {
            const uah = Math.ceil((item.usd * rate * margin) / 5) * 5;
            
            const card = document.createElement('div');
            card.className = 'item';
            
            // Створюємо чистий шаблон картки
            card.innerHTML = `
                <div class="img-box">
                    <img src="images/${item.id}.webp" id="img-${item.id}" alt="${item.name}">
                </div>
                <div class="n">${item.name}</div>
                <span class="c">Арт: ${item.id}</span>
                <div class="p">${uah.toLocaleString()} грн</div>
            `;
            
            list.appendChild(card);

            // Окрема логіка перевірки картинок для кожного ID
            const imgElement = document.getElementById(`img-${item.id}`);
            
            imgElement.onerror = function() {
                // Якщо не знайшли .webp, пробуємо .jpg
                if (this.src.endsWith('.webp')) {
                    this.src = `images/${item.id}.jpg`;
                } 
                // Якщо і .jpg не знайшли, ставимо іконку
                else if (this.src.endsWith('.jpg')) {
                    this.src = 'https://img.icons8.com/ios/100/86868b/electronics.png';
                    this.onerror = null; // Зупиняємо цикл помилок
                }
            };
        });
    </script>
</body>
</html>
