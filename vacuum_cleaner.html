<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техніка для прибирання - Xiaomi</title>
  <link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #1d1d1f; }
        .back { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #0066cc; font-size: 17px; }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.02em; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #f5f5f7; padding: 20px; border-radius: 22px; text-align: center; transition: transform 0.2s ease; }
        .item:hover { transform: scale(1.02); }
        .img-box { background: #fff; height: 180px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .n { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; margin-bottom: 8px; line-height: 1.3; }
        .c { font-size: 11px; color: #86868b; margin-bottom: 12px; display: block; }
        .p { font-size: 19px; font-weight: 600; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Назад</a>
    <h1>Техніка для прибирання - Xiaomi</h1>
    <div class="product-grid" id="list"></div>

    <script>
        const rate = 44.50;
        const margin = 1.10;

        // Список товарів (виправлено помилки та пробіли в ID)
        const products = [
            { id: "0006810", name: "Робот-пилосос RoboRock Q7 Max Black (965495)	", usd: 415.54	 },
            { id: "0008536	", name: "Робот-гаазонокосарка LanDroid M Plus WR165E	", usd: 400,00	 },
            { id: "001012371683	", name: "Швабра Yijie non-woven spray mop, білий (YS-01/FP-24)	", usd: 19,06	 },
            { id: "6932554447052	", name: "Робот-пилосос Xiaomi Robot Vacuum S40 Pro	", usd: 276,00	 },
            { id: "6932554452391	", name: "Пилосос Xiaomi Vacuum Cleaner G30 Max  1178433	", usd: 346,13	 },
            { id: "6936905901682	", name: "Робот-пилосос Roborock QR 798 White  1141773	", usd: 574,45	 },
            { id: "6936905902054	", name: "Робот-пилосос Roborock Q7 TF+ White  1141767	", usd: 324,50	 },
            { id: "6936905902368	", name: "Робот-пилосос Roborock Q10 VF+ Black 1142371	", usd: 404,24	 },
            { id: "6941812760673	", name: "Робот-пилосос Xiaomi Robot Vacuum E5 White 1033284	", usd: 91,00	 },
            { id: "6970995783346	", name: "Робот-пилосос Roborock Qrevo Edge White  (1139659)	", usd: 1298,00	 },
            { id: "6970995783612	", name: "Робот-пилосос Roborock Saros 10 White  1139656	", usd: 1622,60	 },
            { id: "6970995787740	", name: "Робот-пилосос RoboRock Q8 Max+ Black + Док-Станція	", usd: 550,00	 }
            { id: "6970995788631	", name: "Робот-пилосос Roborock Qrevo Pro + Док-Станція	", usd: 550,00	 }
            { id: "6970995789317	", name: "Робот-пилосос RoboRock Qrevo Master + Док-Станція	", usd: 600,00	 }
            { id: "6970995789768	", name: "Робот-пилосос RoboRock Qrevo + Док-Станція (QX0PEA)	", usd: 500,00  }
            { id: "6971820280566	", name: "Робот для миття вікон Xiaomi HUTT W8	", usd: 237,00	 }
            { id: "6971830920216	", name: "Швабра Xiaomi Youpin Bluefish Aluminium Spray Mop (3232218)	", usd: 15,20	 }
            { id: "6974653813383	", name: "Пилосос Roborock Alioth Pro H60 Hub Ultra  1169247	", usd: 468,50	 }
            { id: "6974653813437	", name: "Пилосос Roborock Aries Pro H60 Ultra  1169249	", usd: 305,40	 }
            { id: "6976233676128	", name: "Робот-пилосос Dreame Robot Vacuum X40 Ultra Complete	", usd: 857,00	 }
                  
        ];

        const list = document.getElementById('list');

        products.forEach(item => {
            const uah = Math.ceil((item.usd * rate * margin) / 5) * 5;
            
            const card = document.createElement('div');
            card.className = 'item';
            
            // Створюємо чистий шаблон картки
            card.innerHTML = `
                <div class="img-box">
                    <img src="images/${item.id}.webp" id="img-${item.id}" alt="${item.name}">
                </div>
                <div class="n">${item.name}</div>
                <span class="c">Арт: ${item.id}</span>
                <div class="p">${uah.toLocaleString()} грн</div>
            `;
            
            list.appendChild(card);

            // Окрема логіка перевірки картинок для кожного ID
            const imgElement = document.getElementById(`img-${item.id}`);
            
            imgElement.onerror = function() {
                // Якщо не знайшли .webp, пробуємо .jpg
                if (this.src.endsWith('.webp')) {
                    this.src = `images/${item.id}.jpg`;
                } 
                // Якщо і .jpg не знайшли, ставимо іконку
                else if (this.src.endsWith('.jpg')) {
                    this.src = 'https://img.icons8.com/ios/100/86868b/electronics.png';
                    this.onerror = null; // Зупиняємо цикл помилок
                }
            };
        });
    </script>
</body>
</html>
